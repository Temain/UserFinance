services:
  postgres:
    image: postgres:16-alpine
    container_name: userfinance-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  migration-service:
    build:
      context: .
      dockerfile: src/MigrationService/MigrationService/Dockerfile
    container_name: userfinance-migration-service
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  user-service:
    build:
      context: .
      dockerfile: src/UserService/UserService.Api/Dockerfile
    container_name: userfinance-user-service
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_ISSUER: ${JWT_ISSUER:-UserFinance}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-UserFinance.Client}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-super-secret-development-signing-key-12345}
      JWT_EXPIRES_IN_MINUTES: ${JWT_EXPIRES_IN_MINUTES:-60}
    ports:
      - "${USER_SERVICE_PORT:-8081}:8080"
    depends_on:
      migration-service:
        condition: service_completed_successfully

  finance-service:
    build:
      context: .
      dockerfile: src/FinanceService/FinanceService.Api/Dockerfile
    container_name: userfinance-finance-service
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_ISSUER: ${JWT_ISSUER:-UserFinance}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-UserFinance.Client}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-super-secret-development-signing-key-12345}
      JWT_EXPIRES_IN_MINUTES: ${JWT_EXPIRES_IN_MINUTES:-60}
      USER_SERVICE_URL: http://user-service:8080
      USER_SERVICE_FAVORITES_PATH: /api/users/{userId}/favorites
      USER_SERVICE_REVOKED_TOKEN_PATH: /internal/tokens/{jti}/revoked
    ports:
      - "${FINANCE_SERVICE_PORT:-8082}:8080"
    depends_on:
      migration-service:
        condition: service_completed_successfully

  currency-updater:
    build:
      context: .
      dockerfile: src/CurrencyUpdater/CurrencyUpdater.Worker/Dockerfile
    container_name: userfinance-currency-updater
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CBR_DAILY_RATES_URL: ${CBR_DAILY_RATES_URL:-https://www.cbr.ru/scripts/XML_daily.asp}
      CURRENCY_UPDATER_INTERVAL_MINUTES: ${CURRENCY_UPDATER_INTERVAL_MINUTES:-60}
    depends_on:
      migration-service:
        condition: service_completed_successfully

  api-gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/ApiGateway/Dockerfile
    container_name: userfinance-api-gateway
    environment:
      JWT_ISSUER: ${JWT_ISSUER:-UserFinance}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-UserFinance.Client}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-super-secret-development-signing-key-12345}
      JWT_EXPIRES_IN_MINUTES: ${JWT_EXPIRES_IN_MINUTES:-60}
      USER_SERVICE_URL: http://user-service:8080
      FINANCE_SERVICE_URL: http://finance-service:8080
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    depends_on:
      user-service:
        condition: service_started
      finance-service:
        condition: service_started

volumes:
  postgres-data:
